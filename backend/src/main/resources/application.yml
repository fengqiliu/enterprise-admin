server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: enterprise-admin-system

  # OAuth2 客户端配置（GitHub 登录）
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:your-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - user:email
              - read:user
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login
  
  # 数据源配置 (SQLite for development)
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/enterprise_admin.db
    username:
    password:

  # Redis 配置 (disabled for SQLite mode)
  data:
    redis:
      enabled: false
  
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.enterprise.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      # SQLite 不支持逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: enterprise-admin-system-secret-key-2024
  expiration: 86400000  # 24 小时
  token-prefix: Bearer 
  header: Authorization

# Knife4j Swagger 配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表
  docs:
    default-flat-param-object: true

# 日志配置
logging:
  level:
    root: info
    com.enterprise: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'

# 跨域配置
cors:
  allowed-origins: http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: '*'
  allow-credentials: true